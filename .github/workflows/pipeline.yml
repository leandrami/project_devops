name: NodeJS Product API Pipeline
on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main
jobs:
    security-sast:
        name: 0. SAST (Segurança Python)
        runs-on: ubuntu-latest
        steps:
            - name: Checkout do código
            uses: actions/checkout@v5
            - name: Executar Análise SAST com Bandit
            uses: ajinabraham/njsscan-action@master
            with:
                args: "."

 environment-setup:
    name: 1. Setup & Dependencies
    runs-on: ubuntu-latest
    steps:
        - name: Checkout do código
        uses: actions/checkout@v4

        - name: Configurar o Python
        uses: actions/setup-python@v5
        with:
            python-version: '3.11'
            cache: 'pip'

        - name: Instalar dependências
        run: |
            python -m pip install --upgrade pip
            pip install -r requirements.txt
    
 code-linting:
    name: 2. Code Quality (Flake8)
    needs: environment-setup
    runs-on: ubuntu-latest
    steps:
        - name: Checkout do código
        uses: actions/checkout@v5
        - name: Configurar o Python
        uses: actions/setup-python@v5
        with:
        python-version: '3.11'
        - name: Instalar Linter
        run: pip install flake8
        - name: Executar Linter
        run: flake8 src/
unit-tests:
    name: 3. Automation Tests (PyTest)
    needs: environment-setup
    runs-on: ubuntu-latest
    steps:
        - name: Checkout do código
        uses: actions/checkout@v4

        - name: Configurar o Python
        uses: actions/setup-python@v5
        with:
            python-version: '3.11'

        - name: Instalar dependências de teste
        run: pip install -r requirements.txt pytest

        - name: Executar Testes Unitários
        run: pytest

